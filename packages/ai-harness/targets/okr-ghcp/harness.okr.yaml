# OKR AI-SDLC Harness Wrapper
# Expanded mode: the outer harness owns phase visibility, retries, gates, logs,
# context packet, security baseline, and run state.

target:
  id: okr-ghcp
  name: AINative OKR Claude/GHCP source
  type: ai-sdlc-target
  inner_system: claude-ghcp-prompt-pack
  default_mode: expanded

layers:
  H1:
    name: Context Harness
    responsibility: Build and audit the run context packet before provider execution.
  H2:
    name: Tool Harness
    responsibility: Restrict and document tool/runtime commands used by the target.
  H3:
    name: Evaluation Harness
    responsibility: Enforce deterministic gates for docs, specs, code, tests, and launch.
  H4:
    name: Security Harness
    responsibility: Scan context and generated artifacts for secrets and unsafe markers.
  H5:
    name: Governance Harness
    responsibility: Record risk policy, escalation, retry limits, and approval boundaries.
  H6:
    name: AgentOps Harness
    responsibility: Track provider, cost, phase attempts, gate results, and logs.
  H7:
    name: Orchestration Harness
    responsibility: Execute the OKR SDLC phase graph with resume and repair loops.

specs_glob: "docs/output/specs/*"

prompt_pack:
  command_dirs:
    - commands
  agent_dirs:
    - target:.claude/agents
    - target:.github/agents

context:
  packet_dir: ".specify/harness/context"
  max_file_bytes: 50000
  max_total_bytes: 250000
  # `phases` on a source scopes it to only those phases' context packet.
  # Omit `phases` (or leave it empty) to keep a source global (every phase
  # with a command gets it) — that's the safe default for small/foundational
  # docs. The orchestrator builds ONE filtered packet per phase instead of a
  # single monolithic packet shared by all 17 phases, so a phase only pays
  # for the context it actually needs, and retries (attempt > 1) resume the
  # same agent session + only get the gate failure report — never a re-paste
  # of the full packet (see orchestrator._inject_context).
  sources:
    # Always relevant — small, foundational, applies to every phase.
    - { path: "CLAUDE.md", role: "target-guidance", required: true }
    - { path: "README.md", role: "target-flow", required: true }
    - { path: ".specify/memory/constitution.md", role: "constitution", required: true }
    - { path: ".claude/agents/protocols/report-gate-protocol.md", role: "agent-protocol", required: true }
    - { path: ".claude/agents/protocols/timestamp-protocol.md", role: "agent-protocol", required: true }

    # Business requirements — needed while a phase is producing or reviewing
    # anything traceable back to requirements. Not needed for pure test-run
    # or launch-verification phases.
    - path: "docs/input/**/*.md"
      role: "business-requirements"
      required: true
      phases: [system-srs, srs, basic-design, specify, clarify, review-spec, plan, review-plan, detail-design, generate-tests, implement, review-code]

    # Technical architecture — needed from basic-design onward (anything that
    # touches HOW, not just WHAT). Not needed for srs/specify/clarify, which
    # are architecture-agnostic requirements work.
    - path: "docs/technical_architecture.md"
      role: "technical-architecture"
      required: true
      phases: [basic-design, plan, review-plan, detail-design, tasks, generate-tests, implement, review-code, run-tests]

    # Auto-resolve guidance — only relevant to phases that can hit
    # [NEEDS CLARIFICATION]/ambiguity markers.
    - path: ".claude/agents/protocols/auto-resolve-protocol.md"
      role: "agent-protocol"
      required: true
      phases: [specify, clarify, review-spec, plan, review-plan, detail-design, tasks]

    # Implementation-only rules (Prisma/enum, .env, JWT secrets, React Router
    # flags, RBAC query rules). These are real correctness rules, not boss
    # bookkeeping — keep them, but only for the phase that needs them.
    - path: ".claude/agents/protocols/implement-delegation.md"
      role: "agent-protocol"
      required: true
      phases: [implement]

    # NOTE: the following are intentionally excluded from expanded-mode
    # context — they are boss-mode-only self-orchestration mechanics
    # (single mega-session parsing its own sub-agent handoffs, writing to
    # `00-boss.log.md` / `pipeline-context.yaml`). Expanded mode's Python
    # orchestrator (orchestrator.py) already owns phase sequencing, gates,
    # retries and structured logging via db_logger/state_store, so agents
    # never need this boss-internal bookkeeping:
    #   .claude/agents/steps/*.md                       ("Boss MUST read...")
    #   .claude/agents/protocols/gate-retry-protocol.md  (boss's own retry loop table)
    #   .claude/agents/protocols/log-formats.md          ("Boss Log Entry Formats")
    #   .claude/agents/protocols/pipeline-context.md     ("The Boss maintains...")
    #   .claude/agents/protocols/step-result-block.md    ("The Boss parses this block")
    # harness.okr.boss.yaml has its own independent context.sources and still
    # includes all of these for actual boss-mode runs.

agent:
  provider: codex
  bin: codex
  model: "gpt-5.4-mini"  # cheapest available Codex model, to minimize token cost
  max_turns: 40
  max_budget_usd: 0
  allowed_tools: "Read,Write,Edit,Bash,Glob,Grep,TodoWrite"
  skip_permissions: true
  extra_args: ["-c", "model_reasoning_effort=low"]

project:
  build: "docker compose build"
  typecheck: "docker compose run --rm backend npm run typecheck && docker compose run --rm frontend npm run typecheck"
  lint: "docker compose run --rm backend npm run lint && docker compose run --rm frontend npm run lint"
  test: "docker compose run --rm backend npm test && docker compose run --rm frontend npm test"
  security: "docker compose run --rm backend npm audit --audit-level=high && docker compose run --rm frontend npm audit --audit-level=high"
  acceptance: "docker compose up -d mysql backend frontend && docker compose ps"

phases:
  - name: H1-context
    max_attempts: 1
    gates: []  # gate removed — internal step, only H4 gates enforced

  - name: H4-context-security
    max_attempts: 1
    gates: []  # BYPASSED — context-secret-scan disabled temporarily
    # gates:
    #   - name: context-secret-scan
    #     type: secret_scan
    #     params:
    #       include:
    #         - "{context_packet}"
    #         - "docs/input/**/*.md"
    #         - ".specify/memory/*.md"
    #       patterns:
    #         - "AKIA[0-9A-Z]{16}"
    #         - "(?i)\\b(OPENAI_API_KEY|ANTHROPIC_API_KEY|...)\\b\\s*[:=]..."
    #       exclude:
    #         - ".git/**"
    #         - "node_modules/**"

  - name: system-srs
    # One-time, pre-flow per README ("not part of the main flow steps") —
    # skip regeneration on repeat runs once the system-wide SRS already exists.
    skip_if_exists: "docs/output/srs-systems/srs-overview-system.md"
    command: |
      /okr.srs.getsrsall
      feature: {feature}
      context-packet: {context_packet}
      context-manifest: {context_manifest}
      mode: harness-expanded
      language: Vietnamese
    max_attempts: 2
    gates: []  # gate removed — internal step, only H4 gates enforced

  - name: srs
    command: |
      /okr.srs
      feature: {feature}
      context-packet: {context_packet}
      context-manifest: {context_manifest}
      mode: harness-expanded
      language: Vietnamese
    max_attempts: 2
    gates: []  # gate removed — internal step, only H4 gates enforced

  - name: basic-design
    command: |
      /okr.bd
      feature: {feature}
      context-packet: {context_packet}
      context-manifest: {context_manifest}
      mode: harness-expanded
      language: Vietnamese
    max_attempts: 2
    gates: []  # gate removed — internal step, only H4 gates enforced

  - name: specify
    command: |
      /speckit.specify
      feature: {feature}
      context-packet: {context_packet}
      context-manifest: {context_manifest}
      mode: harness-expanded
      language: Vietnamese
    max_attempts: 2
    gates: []  # gate removed — internal step, only H4 gates enforced

  - name: clarify
    command: |
      /speckit.clarify
      feature: {feature}
      context-packet: {context_packet}
      context-manifest: {context_manifest}
      mode: harness-expanded
      language: Vietnamese
    max_attempts: 2
    gates: []  # gate removed — internal step, only H4 gates enforced

  - name: review-spec
    command: |
      /okr.reviewspec
      feature: {feature}
      context-packet: {context_packet}
      context-manifest: {context_manifest}
      mode: harness-expanded
      language: Vietnamese
    max_attempts: 2
    gates: []  # gate removed — internal step, only H4 gates enforced

  - name: plan
    command: |
      /speckit.plan
      feature: {feature}
      tech-stack: {tech_stack}
      context-packet: {context_packet}
      context-manifest: {context_manifest}
      mode: harness-expanded
      language: Vietnamese
    max_attempts: 2
    gates: []  # gate removed — internal step, only H4 gates enforced

  - name: review-plan
    command: |
      /okr.reviewplan
      feature: {feature}
      context-packet: {context_packet}
      context-manifest: {context_manifest}
      mode: harness-expanded
      language: Vietnamese
    max_attempts: 2
    gates: []  # gate removed — internal step, only H4 gates enforced

  - name: detail-design
    command: |
      /okr.dd
      feature: {feature}
      context-packet: {context_packet}
      context-manifest: {context_manifest}
      mode: harness-expanded
      language: Vietnamese
    max_attempts: 2
    gates: []  # gate removed — internal step, only H4 gates enforced

  - name: tasks
    command: |
      /speckit.tasks
      feature: {feature}
      context-packet: {context_packet}
      context-manifest: {context_manifest}
      mode: harness-expanded
      language: Vietnamese
    max_attempts: 2
    gates: []  # gate removed — internal step, only H4 gates enforced

  - name: generate-tests
    command: |
      /okr.testkit
      action: gen-testcases
      feature: {feature}
      context-packet: {context_packet}
      context-manifest: {context_manifest}
      mode: harness-expanded
      language: Vietnamese
    max_attempts: 2
    gates: []  # gate removed — internal step, only H4 gates enforced

  - name: implement
    command: |
      /speckit.implement
      feature: {feature}
      context-packet: {context_packet}
      context-manifest: {context_manifest}
      mode: harness-expanded
      language: Vietnamese
    max_attempts: 3
    gates: []  # gate removed — internal step, only H4 gates enforced

  - name: review-code
    command: |
      /okr.reviewcode
      feature: {feature}
      context-packet: {context_packet}
      context-manifest: {context_manifest}
      mode: harness-expanded
      language: Vietnamese
    max_attempts: 2
    gates: []  # gate removed — internal step, only H4 gates enforced

  - name: run-tests
    command: |
      /okr.testkit
      action: run-tests
      feature: {feature}
      context-packet: {context_packet}
      context-manifest: {context_manifest}
      mode: harness-expanded
      language: Vietnamese
    max_attempts: 2
    gates: []  # gate removed — internal step, only H4 gates enforced

  - name: H4-generated-security
    max_attempts: 1
    gates:
      - name: generated-secret-scan
        type: secret_scan
        params:
          include:
            - "backend/**/*"
            - "frontend/**/*"
            - "docker-compose*.yml"
            - "docs/output/**/*.md"
          patterns:
            - "AKIA[0-9A-Z]{16}"
            - "(?i)\\b(OPENAI_API_KEY|ANTHROPIC_API_KEY|AWS_SECRET_ACCESS_KEY|JWT_SECRET|DATABASE_URL|MYSQL_ROOT_PASSWORD)\\b\\s*[:=]\\s*['\\\"]?[A-Za-z0-9_./+\\-]{16,}"
            - "-----BEGIN (RSA|OPENSSH|EC|DSA)? ?PRIVATE KEY-----"
          exclude:
            - "backend/node_modules/**"
            - "frontend/node_modules/**"
            - ".git/**"
      - { name: dependency-audit, type: shell, params: { cmd: "${project.security}" } }

  - name: verify-launch
    max_attempts: 1
    gates: []  # gate removed — internal step, only H4 gates enforced
